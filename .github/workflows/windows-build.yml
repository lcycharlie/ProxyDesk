name: Windows build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Download dependencies
        run: go mod tidy

      - name: Embed Windows resources
        run: |
          go run github.com/akavel/rsrc@v0.10.2 -manifest build/windows/ProxyDesk.exe.manifest -ico build/windows/ProxyDesk.ico -o cmd/proxydesk/rsrc.syso
          go run ./build/tools/fix_icon_group.go cmd/proxydesk/rsrc.syso
          go run github.com/akavel/rsrc@v0.10.2 -manifest build/windows/ProxyDesk.exe.manifest -ico build/windows/ProxyDesk.ico -o cmd/proxydesk-modern/rsrc.syso
          go run ./build/tools/fix_icon_group.go cmd/proxydesk-modern/rsrc.syso

      - name: Build Windows exe
        run: |
          go build -ldflags="-H windowsgui -s -w" -o dist/ProxyDesk.exe ./cmd/proxydesk
          go build -tags desktop,production -ldflags="-H windowsgui -s -w" -o dist/ProxyDeskModern.exe ./cmd/proxydesk-modern

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build Windows installer
        run: iscc build/windows/ProxyDesk.iss

      - uses: actions/upload-artifact@v4
        with:
          name: ProxyDesk-windows-amd64
          path: |
            dist/ProxyDesk.exe
            dist/ProxyDeskModern.exe
            dist/ProxyDeskSetup.exe
