name: Windows build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: mingw-w64-ucrt-x86_64-gcc

      - name: Add MinGW to PATH
        run: echo "C:\msys64\ucrt64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Download dependencies
        run: go mod tidy

      - name: Build Windows exe
        env:
          CGO_ENABLED: "1"
        run: go build -ldflags="-H windowsgui -s -w" -o dist/ProxyDesk.exe ./cmd/proxydesk

      - uses: actions/upload-artifact@v4
        with:
          name: ProxyDesk-windows-amd64
          path: dist/ProxyDesk.exe
