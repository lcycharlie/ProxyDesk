name: Windows build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - name: Download dependencies
        run: go mod tidy

      - name: Build Windows exe
        run: go build -ldflags="-H windowsgui -s -w" -o dist/ProxyDesk.exe ./cmd/proxydesk

      - uses: actions/upload-artifact@v4
        with:
          name: ProxyDesk-windows-amd64
          path: dist/ProxyDesk.exe
